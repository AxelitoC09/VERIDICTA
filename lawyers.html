<style>
  :root{
    --bg: #ffffff;
    --card-bg: #eeeeee;
    --card-bg-hover: #e6e6e6;
    --ink: #1a1a1a;
    --ink-soft: #5c5c5c;
    --line: #dcdcdc;
    --gold: #f0b400;
    --gold-dim: #e3e3e3;
    --radius-lg: 28px;
  }

  .bl-section{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    padding: 64px 5vw 96px;
  }

  .bl-title{
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.02em;
    text-align: center;
    margin: 0 0 40px;
  }

  .bl-layout{
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
    align-items: start;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ---------- Search panel ---------- */
  .bl-search-panel{
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    position: sticky;
    top: 24px;
  }

  .bl-search-panel h3{
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin: 0 0 16px;
  }

  .bl-search-box{
    display: flex;
    align-items: center;
    gap: 8px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 14px;
  }

  .bl-search-box input{
    border: none;
    outline: none;
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    background: transparent;
    color: var(--ink);
  }

  .bl-search-box input::placeholder{ color: #9a9a9a; }

  .bl-search-box svg{ flex-shrink: 0; opacity: 0.6; }

  .bl-suggestions{
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }

  .bl-chip{
    font-size: 11px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 999px;
    background: #ffffff;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .bl-chip:hover,
  .bl-chip.active{
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .bl-result-count{
    margin-top: 18px;
    font-size: 12px;
    color: var(--ink-soft);
    min-height: 16px;
  }

  /* ---------- Grid ---------- */
  .bl-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .bl-card{
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 28px 20px 24px;
    text-align: center;
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  }

  .bl-card:hover{
    background: var(--card-bg-hover);
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.06);
  }

  .bl-avatar{
    width: 96px;
    height: 96px;
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fffff1;
    border: 1px solid var(--line);
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink-soft);
  }

  .bl-name{
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin: 0 0 4px;
  }

  .bl-specialty{
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }

  .bl-stars{
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--gold-dim);
  }

  .bl-stars .filled{ color: var(--gold); }

  .bl-empty{
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }

  .bl-empty strong{
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px){
    .bl-layout{ grid-template-columns: 1fr; }
    .bl-search-panel{ position: static; }
    .bl-grid{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 560px){
    .bl-grid{ grid-template-columns: 1fr; }
  }
</style>

<section class="bl-section">
  <h2 class="bl-title">BEST LAWYERS</h2>

  <div class="bl-layout">

    <!-- ============ PANEL DE BÚSQUEDA ============ -->
    <aside class="bl-search-panel">
      <h3>FIND YOUR LAWYER</h3>
      <div class="bl-search-box">
        <input type="text" id="bl-search-input" placeholder="Tell us what are you looking for...">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>

      <!-- Sugerencias rápidas: al hacer click rellenan el buscador -->
      <div class="bl-suggestions">
        <span class="bl-chip" data-query="divorcio">Divorcio</span>
        <span class="bl-chip" data-query="despido">Despido laboral</span>
        <span class="bl-chip" data-query="robo">Robo / Delitos</span>
        <span class="bl-chip" data-query="contrato">Contratos</span>
        <span class="bl-chip" data-query="propiedad">Bienes raíces</span>
        <span class="bl-chip" data-query="deuda">Deudas civiles</span>
      </div>

      <p class="bl-result-count" id="bl-result-count"></p>
    </aside>

    <!-- ============ GRID DE ABOGADOS ============ -->
    <div class="bl-grid" id="bl-grid"></div>

  </div>
</section>

<script>
(function(){

  // ------------------------------------------------------------
  // 1) BASE DE DATOS DE ABOGADOS
  //    - "keywords" son las palabras que la gente escribirá al buscar
  //      su problema. Agrega todas las variantes que quieras.
  //    - Para agregar un abogado nuevo, copia un objeto y edítalo.
  // ------------------------------------------------------------
  const lawyers = [
    {
      name: "Valentina Rojas",
      specialty: "Derecho de Familia",
      rating: 5,
      keywords: ["divorcio", "custodia", "pension alimenticia", "familia", "matrimonio", "adopcion"]
    },
    {
      name: "Carlos Calles",
      specialty: "Derecho Corporativo",
      rating: 5,
      keywords: ["contrato", "empresa", "sociedad", "negocios", "corporativo", "fusion", "startup"]
    },
    {
      name: "Camila Herrera",
      specialty: "Derecho Penal",
      rating: 3.5,
      keywords: ["robo", "delito", "penal", "defensa penal", "detencion", "fraude"]
    },
    {
      name: "Javier Morales",
      specialty: "Derecho Laboral",
      rating: 3.5,
      keywords: ["despido", "laboral", "indemnizacion", "trabajo", "acoso laboral", "salario"]
    },
    {
      name: "Gabriela Mendoza",
      specialty: "Derecho Civil",
      rating: 4,
      keywords: ["deuda", "arrendamiento", "civil", "demanda", "vecinos", "herencia"]
    },
    {
      name: "Santiago Castillo",
      specialty: "Derecho Inmobiliario",
      rating: 5,
      keywords: ["propiedad", "bienes raices", "inmobiliario", "compraventa", "terreno", "hipoteca"]
    }
    
  ];

  const grid = document.getElementById('bl-grid');
  const input = document.getElementById('bl-search-input');
  const resultCount = document.getElementById('bl-result-count');
  const chips = document.querySelectorAll('.bl-chip');

  // ------------------------------------------------------------
  // 2) RENDER de estrellas (soporta medias estrellas, ej. 3.5)
  // ------------------------------------------------------------
  function renderStars(rating){
    let html = '';
    for(let i = 1; i <= 5; i++){
      html += i <= rating ? '<span class="filled">★</span>' : '<span>★</span>';
    }
    return html;
  }

  // ------------------------------------------------------------
  // 3) Iniciales para el círculo de cada tarjeta (sin foto)
  // ------------------------------------------------------------
  function getInitials(name){
    return name
      .split(' ')
      .map(part => part[0])
      .join('')
      .slice(0, 2)
      .toUpperCase();
  }

  // ------------------------------------------------------------
  // 4) RENDER de las tarjetas
  // ------------------------------------------------------------
  function renderCards(list){
    grid.innerHTML = '';

    if(list.length === 0){
      grid.innerHTML = `
        <div class="bl-empty">
          <strong>No encontramos un abogado para eso todavía</strong>
          Intenta con otra palabra, por ejemplo "divorcio" o "contrato".
        </div>`;
      return;
    }

    list.forEach(lawyer => {
      const card = document.createElement('div');
      card.className = 'bl-card';
      card.innerHTML = `
        <div class="bl-avatar">${getInitials(lawyer.name)}</div>
        <p class="bl-name">${lawyer.name}</p>
        <p class="bl-specialty">${lawyer.specialty}</p>
        <div class="bl-stars">${renderStars(lawyer.rating)}</div>
      `;
      grid.appendChild(card);
    });
  }

  // ------------------------------------------------------------
  // 5) FILTRO: busca coincidencias en nombre, especialidad o keywords
  // ------------------------------------------------------------
  function normalize(str){
    return str.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, ''); // quita acentos
  }

  function filterLawyers(query){
    const q = normalize(query.trim());
    if(q === ''){
      resultCount.textContent = '';
      return lawyers;
    }

    const matches = lawyers.filter(lawyer => {
      const haystack = normalize(
        lawyer.name + ' ' + lawyer.specialty + ' ' + lawyer.keywords.join(' ')
      );
      return haystack.includes(q);
    });

    resultCount.textContent = matches.length > 0
      ? `${matches.length} abogado(s) encontrados para "${query}"`
      : `Sin resultados para "${query}"`;

    return matches;
  }

  // ------------------------------------------------------------
  // 6) EVENTOS
  // ------------------------------------------------------------
  input.addEventListener('input', () => {
    chips.forEach(c => c.classList.remove('active'));
    renderCards(filterLawyers(input.value));
  });

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      input.value = chip.dataset.query;
      renderCards(filterLawyers(chip.dataset.query));
    });
  });

  // Carga inicial: muestra todos los abogados
  renderCards(lawyers);

})();
</script>
